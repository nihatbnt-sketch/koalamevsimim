<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koala Mevsimi</title>

<style>
body{
margin:0;
background:linear-gradient(#020111,#000);
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
color:white;
text-align:center;
}

/* BAŞLIK */
h1{margin-top:30px;font-size:40px}
.alt{font-size:22px;margin-bottom:10px}
.info{font-size:18px;opacity:.8;margin-bottom:20px}

/* YILDIZ */
.star{
position:absolute;
color:#fff;
font-size:22px;
cursor:pointer;
transition:.3s;
user-select:none;
}
.star:hover{transform:scale(1.2)}
.visitor{color:#b26bff}

/* SÖZ */
.quote{
position:absolute;
background:rgba(0,0,0,.7);
padding:10px 14px;
border-radius:12px;
font-size:18px;
max-width:240px;
animation:fade 4s forwards;
}
@keyframes fade{
0%{opacity:0;transform:translateY(10px)}
10%{opacity:1}
90%{opacity:1}
100%{opacity:0;transform:translateY(-10px)}
}

/* KIRIK KALP */
.heart{
position:absolute;
color:#ff4d6d;
font-size:22px;
animation:heart .8s forwards;
}
@keyframes heart{
0%{opacity:1;transform:scale(.5)}
100%{opacity:0;transform:translateY(-20px) scale(1.4)}
}

/* KAYAN YILDIZ */
.shoot{
position:absolute;
color:white;
animation:shoot 1s linear;
}
@keyframes shoot{
0%{opacity:1;transform:translate(0,0)}
100%{opacity:0;transform:translate(200px,120px)}
}

/* MANDALİNA */
.mandalina{
cursor:pointer;
display:inline-block;
font-size:28px;
animation:beat 2s infinite;
}
@keyframes beat{
0%,100%{transform:scale(1)}
50%{transform:scale(1.15)}
}

/* ZİYARETÇİ KUTUSU */
.box{
position:fixed;
top:15px;
left:15px;
background:rgba(0,0,0,.6);
padding:12px;
border-radius:14px;
backdrop-filter:blur(6px);
}
.box input{
padding:6px;
border-radius:8px;
border:none;
outline:none;
}
.box button{
padding:6px 10px;
border:none;
border-radius:8px;
background:#b26bff;
color:white;
cursor:pointer;
}

audio{display:none}
</style>
</head>

<body>

<div class="box">
<div style="font-size:14px;margin-bottom:5px">Sen de bir söz ekle</div>
<input id="visitorText" placeholder="kalbinden geçen...">
<button onclick="addVisitor()">Ekle</button>
</div>

<h1>Koala Mevsimi <span class="mandalina" onclick="mandalina()">🍊</span></h1>
<div class="alt">Bazı şeyler söylenemez</div>
<div class="info">Yıldızların üstüne basmayı unutma</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

/* SENİN SÖZLER */
const sozler=[
"Özlemek, adını içimde sessizce haykırmaktır.",
"Gözlerin uzakta ama kalbin hâlâ içimde.",
"Hasret geceleri konuşan sessizliğim oldu.",
"Sen yoksan kalabalıklar bile yalnız.",
"Sesini unutmadım sadece susmayı öğrendim.",
"İçimde hâlâ sen varsın ama eskisi gibi değil.",
"Kalbim sustu çünkü anlatınca değişmiyorsun."
];

/* YILDIZ OLUŞTUR */
function createStar(text,visitor=false){
const star=document.createElement("div");
star.className="star";
if(visitor) star.classList.add("visitor");
star.innerHTML="★";
star.style.top=Math.random()*80+15+"vh";
star.style.left=Math.random()*95+"vw";

star.onclick=(e)=>{
const q=document.createElement("div");
q.className="quote";
q.innerText=text;
q.style.top=star.offsetTop-10+"px";
q.style.left=star.offsetLeft+20+"px";
document.body.appendChild(q);
setTimeout(()=>q.remove(),4000);

const heart=document.createElement("div");
heart.className="heart";
heart.innerText="💔";
heart.style.top=star.offsetTop+"px";
heart.style.left=star.offsetLeft+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),800);
}
document.body.appendChild(star);
}

/* BAŞLANGIÇ YILDIZLARI */
sozler.forEach(s=>createStar(s));

/* ZİYARETÇİ SÖZ */
function addVisitor(){
const val=document.getElementById("visitorText").value;
if(!val) return;
createStar(val,true);
document.getElementById("visitorText").value="";
}

/* KAYAN YILDIZ */
setInterval(()=>{
const s=document.createElement("div");
s.className="shoot";
s.innerHTML="✦";
s.style.top=Math.random()*50+"vh";
s.style.left=Math.random()*50+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
},5000);

/* MANDALİNA */
function mandalina(){
alert("Kalbim senden vazgeçmedi… sadece yoruldu.");
}

</script>
</body>
</html>
