<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koala Mevsimi</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,Helvetica,sans-serif;
color:white;
text-align:center;
}

/* YAZI ALANI */
.content{
position:relative;
z-index:5;
margin-top:120px;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:5px;
}

.sub{
font-size:22px;
opacity:.8;
}

.info{
margin-top:15px;
font-size:20px;
opacity:.7;
}

/* MANDALINA */
.orange{
font-size:34px;
cursor:pointer;
margin-left:10px;
}

/* MÜZİK */
.musicBtn{
position:fixed;
top:20px;
right:20px;
z-index:20;
background:#ffffff20;
border:none;
color:white;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

/* YILDIZ */
.star{
position:absolute;
font-size:28px;
cursor:pointer;
z-index:1;
animation:parla 2s infinite alternate;
}

@keyframes parla{
from{opacity:.4;transform:scale(1);}
to{opacity:1;transform:scale(1.3);}
}

/* YILDIZ YAZISI */
.starText{
position:absolute;
background:rgba(0,0,0,.75);
padding:12px 18px;
border-radius:14px;
font-size:20px;
z-index:10;
pointer-events:none;
animation:fade 3s forwards;
}

@keyframes fade{
0%{opacity:0}
10%{opacity:1}
90%{opacity:1}
100%{opacity:0}
}

/* KAYAN YILDIZ */
.shoot{
position:absolute;
color:white;
font-size:18px;
animation:kay 1.2s linear;
}

@keyframes kay{
from{transform:translate(0,0)}
to{transform:translate(-200px,200px);opacity:0}
}

</style>
</head>
<body>

<div class="content">
<h1>Koala Mevsimi <span class="orange" onclick="mandalina()">🍊</span></h1>
<div class="sub">bazı şeyler söylenemez</div>
<div class="info">yıldızların üstüne basmayı unutma</div>
</div>

<button class="musicBtn" onclick="muzik()">Müziği Başlat / Durdur</button>

<audio id="music" loop>
<source src="muzik.mp3" type="audio/mp3">
</audio>

<script>

/* MÜZİK */
function muzik(){
let m=document.getElementById("music");
m.paused ? m.play() : m.pause();
}

/* MANDALINA SÖZ */
function mandalina(){
alert("Kalbim senden vazgeçmedi… sadece dayanacak gücü kalmadı.");
}

/* SÖZLER */
const sozler=[
"Yokluğun artık canımı yakmıyor… sadece içimi boşaltıyor.",
"Sesini unutmadım ama artık duymaya hakkım yok.",
"Ben seni kaybetmedim… sen beni yarım bıraktın.",
"Geceler değil, düşünceler uykumu çalıyor.",
"İçimde hâlâ sen varsın ama eskisi gibi değil.",
"Kalbim sustu… çünkü anlatınca değişmiyorsun.",
"Özlemek artık alışkanlık oldu.",
"Sana kızmıyorum… kendime geç kaldığım için kırgınım.",
"Mutlu olduğun yerde değilim ama hâlâ seninleyim.",
"Bir gün dönersen… beni aynı yerde bulamayacaksın."
];

/* YILDIZ OLUŞTUR */
for(let i=0;i<45;i++){

let star=document.createElement("div");
star.className="star";
star.innerHTML="★";

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

/* YAZI ALANINDAN UZAK TUT */
if(y>120 && y<420){ y+=250; }

star.style.left=x+"px";
star.style.top=y+"px";

star.onclick=(e)=>{

/* KAYAN YILDIZ */
let shoot=document.createElement("div");
shoot.className="shoot";
shoot.innerHTML="✦";
shoot.style.left=x+"px";
shoot.style.top=y+"px";
document.body.appendChild(shoot);
setTimeout(()=>shoot.remove(),1200);

/* YAZI */
let text=document.createElement("div");
text.className="starText";
text.innerText=sozler[Math.floor(Math.random()*sozler.length)];
text.style.left=(x-60)+"px";
text.style.top=(y-50)+"px";
document.body.appendChild(text);
setTimeout(()=>text.remove(),3000);

};

document.body.appendChild(star);
}

</script>
</body>
</html>
