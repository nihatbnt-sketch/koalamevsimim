<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koala mevsimi</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;
text-align:center;
}

/* BAŞLIK */
.title{
font-size:42px;
margin-top:40px;
}

.mandalina{
cursor:pointer;
font-size:40px;
margin-left:10px;
transition:.3s;
}
.mandalina:hover{transform:scale(1.2) rotate(10deg);}

/* ALT YAZILAR */
.alt{
font-size:26px;
margin-top:10px;
opacity:.9;
}

.info{
font-size:20px;
opacity:.7;
margin-bottom:20px;
}

/* MÜZİK BUTON */
.music{
position:fixed;
top:20px;
right:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
}

/* YILDIZLAR */
.star{
position:absolute;
color:white;
font-size:26px;
cursor:pointer;
animation:parla 2s infinite alternate;
}

@keyframes parla{
from{opacity:.3; transform:scale(.8);}
to{opacity:1; transform:scale(1.4);}
}

/* SÖZ */
.soz{
position:fixed;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
opacity:0;
transition:1s;
max-width:80%;
}

/* KAYAN YILDIZ */
.kayan{
position:fixed;
top:0;
left:-100px;
font-size:30px;
animation:kay 1s linear;
}
@keyframes kay{
to{transform:translate(120vw,60vh);}
}
</style>
</head>

<body>

<h1 class="title">
koala mevsimi <span class="mandalina" onclick="mandalina()">🍊</span>
</h1>

<div class="alt">bazı şeyler söylenemez</div>
<div class="info">yıldızların üstüne basmayı unutma</div>

<button class="music" onclick="muzik()">müziği başlat</button>
<audio id="music" src="muzik.mp3" loop></audio>

<div id="soz" class="soz"></div>

<script>

/* MÜZİK */
function muzik(){
let m=document.getElementById("music");
m.paused ? m.play() : m.pause();
}

/* YILDIZ SÖZLERİ */
const sozler=[
"seni unutmaya çalışmıyorum artık… sadece içimde acımadan hatırlamak istiyorum.",
"bazı geceler geçmiyor, çünkü sen hâlâ içimde uyanıksın.",
"seni özlemek artık bir alışkanlık değil, içimde kalan tek gerçek.",
"gittiğin yerde mutlu ol… ben yokluğunda yaşamayı öğreniyorum.",
"sana söyleyemediklerim içimde büyüyüp sessizliğe dönüştü.",
"insan vazgeçmiyor… sadece yoruluyor.",
"sen yokken bile kalbim seni var sanmaya devam etti.",
"en çok da gelmeyeceğini bildiğim halde beklemek kırdı beni.",
"seninle değil, sensizliğinle yaşamayı öğrendim.",
"bir gün dönsen bile içimdeki yerini bulamayacaksın."
];

/* YILDIZ OLUŞTUR */
for(let i=0;i<45;i++){
let s=document.createElement("div");
s.className="star";
s.innerHTML="★";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.onclick=()=>{
let kutu=document.getElementById("soz");
kutu.innerHTML=sozler[Math.floor(Math.random()*sozler.length)];
kutu.style.opacity=1;

let k=document.createElement("div");
k.className="kayan";
k.innerHTML="☄";
document.body.appendChild(k);
setTimeout(()=>k.remove(),1000);

setTimeout(()=>kutu.style.opacity=0,4000);
};

document.body.appendChild(s);
}

/* MANDALİNA GİZLİ SÖZ */
function mandalina(){
let kutu=document.getElementById("soz");
kutu.innerHTML=`
kalbim senden vazgeçmedi…<br>
sadece dayanacak gücü kalmadı.<br><br>
ve içimde hâlâ sen varsın,<br>
ama artık beni mutlu ettiğin yerde değil.
`;
kutu.style.opacity=1;
setTimeout(()=>kutu.style.opacity=0,6000);
}
</script>

</body>
</html>
