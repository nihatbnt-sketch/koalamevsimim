<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koala Mevsimi</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(#0b0b1a,#000);
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
}

/* içerik */
.content{
  position:relative;
  z-index:5;
  margin-top:90px;
}

h1{font-size:40px;}
.alt{font-size:22px; opacity:.8;}

.bilgi{margin-top:10px; font-size:20px; opacity:.7}

/* yıldızlar */
.star{
  position:absolute;
  color:white;
  font-size:10px;   /* daha küçük */
  cursor:pointer;
  z-index:2;
  animation:parla 2s infinite alternate;
}
@keyframes heartUp{
  0%{opacity:1; transform:translateY(0) scale(1);}
  100%{opacity:0; transform:translateY(-90px) scale(1.6);}
}


/* söz kutusu */
.star-text{
  position:absolute;
  z-index:10;
  background:rgba(0,0,0,.75);
  padding:10px 16px;
  border-radius:14px;
  font-size:18px;
}

function kirikKalp(x,y){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💔";
  h.style.left=(x-10)+"px";
  h.style.top=(y-10)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1600);
}
@keyframes heartUp{
  0%{opacity:1; transform:translateY(0) scale(1);}
  100%{opacity:0; transform:translateY(-70px) scale(1.4);}
}

/* mandalina */
.mandalina{
  font-size:30px;
  cursor:pointer;
}

/* gece modu */
.dark{
  background: radial-gradient(#02020a,#000);
}

.toggle{
  position:fixed;
  right:15px;
  bottom:15px;
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="content">
  <h1>Koala Mevsimi <span class="mandalina" onclick="mandalinaMesaj()">🍊</span></h1>
  <div class="alt">bazı şeyler söylenemez</div>
  <div class="bilgi">yıldızların üstüne basmayı unutma</div>
</div>

<button class="toggle" onclick="gece()">🌙 gece modu</button>

<script>

/* SÖZLER */
const sozler=[
"Özlemek, adını içimde sessizce haykırmaktır.",
"Gözlerin uzakta, ama kalbin hâlâ avuçlarımda gibi.",
"Hasretin, geceleri en çok konuşan sessizliğim oldu.",
"Sen yoksan, kalabalıklar bile yalnızlıktır.",
"Mesafeler sadece bedenleri ayırır, kalpleri değil.",
"Özlemek bazen bir şarkıda boğulmak gibidir.",
"Gülüşünü hatırladıkça içimde bir ev yanıyor.",
"Seninle susmak bile mutluluktu, sensizlik en gürültülü acı.",
"Adını duymak bile kalbime dokunan bir rüzgâr.",
"Hasret, gözlerimin senden habersiz dolmasıdır.",
"Seni düşünmek, yarım kalan bir masalın içinde yaşamaktır.",
"Kalbim sana kavuşacağı günü ezberliyor.",
"Sensizliğe alışmak, nefes almadan yaşamaya çalışmak gibi.",
"Bir gün sarılırsam, bütün hasretim gözyaşı olacak.",
"Yokluğun artık canımı yakmıyor… sadece içimi boşaltıyor.",
"Sesini unutmadım ama artık duymaya hakkım yok.",
"Ben seni kaybetmedim… sen beni yarım bıraktın.",
"Geceler değil, düşünceler uykumu çalıyor.",
"İçimde hâlâ sen varsın ama eskisi gibi değil.",
"Kalbim sustu… çünkü anlatınca değişmiyorsun."
];

/* yıldız üret */
for(let i=0;i<70;i++){
  let star=document.createElement("div");
  star.className="star";
  star.innerHTML="✦";

  let x=Math.random()*window.innerWidth;
  let y=Math.random()*window.innerHeight;

  if(y>160 && y<420) y+=200; // yazı bölgesinden uzaklaştır

  star.style.left=x+"px";
  star.style.top=y+"px";

  star.onclick=(e)=>{
    sozGoster(e.pageX,e.pageY);
    kirikKalp(e.pageX,e.pageY);
  }

  document.body.appendChild(star);
}

/* söz göster */
function sozGoster(x,y){
  let box=document.createElement("div");
  box.className="star-text";
  box.innerText=sozler[Math.floor(Math.random()*sozler.length)];
  box.style.left=x+"px";
  box.style.top=y+"px";
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),3000);
}

/* kırık kalp efekti */
function kirikKalp(x,y){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💔";
  h.style.left=x+"px";
  h.style.top=y+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1400);
}

/* mandalina mesaj */
function mandalinaMesaj(){
  alert("kalbim senden vazgeçmedi… sadece dayanacak gücü kalmadı.");
}

/* gece modu */
function gece(){
  document.body.classList.toggle("dark");
}

</script>
</body>
</html>
